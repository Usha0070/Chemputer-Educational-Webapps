            arrowColor: "text-[#fb7185]",
            explanation: "গ্যাসীয় অবস্থায় কোনো মৌলের এক মোল পরমাণুতে এক মোল ইলেকট্রন যোগ করে ঋণাত্মক আয়নে পরিণত করতে যে শক্তি নির্গত হয় তাকে ইলেকট্রন আসক্তি বলে। পর্যায়ে বাম থেকে ডানে গেলে আকার ছোট হয়, তাই আগত ইলেকট্রনের প্রতি নিউক্লিয়াসের আকর্ষণ বেশি থাকে। গ্রুপে নিচে নামলে আকার বাড়ে, ফলে আকর্ষণ কমে যায়। (বি.দ্র. নিষ্ক্রিয় গ্যাসের ইলেকট্রন আসক্তি প্রায় শূন্য)।",
            exception: "সাধারণত গ্রুপের ওপর থেকে নিচে ইলেকট্রন আসক্তি কমে। কিন্তু ফ্লোরিনের (F) আকার অত্যন্ত ছোট হওয়ায় এর ২য় শক্তিস্তরে ইলেকট্রন ঘনত্ব খুব বেশি থাকে, যা নতুন আগত ইলেকট্রনকে বিকর্ষণ করে। অন্যদিকে ক্লোরিনের (Cl) আকার বড় হওয়ায় বিকর্ষণ কম হয়। তাই ফ্লোরিনের চেয়ে ক্লোরিনের ইলেকট্রন আসক্তি বেশি (Cl > F)।"
          },
          electronegativity: {
            id: 'electronegativity',
            icon: IconShare2,
            title: "তড়িৎ ঋণাত্মকতা",
            subtitle: "(Electronegativity)",
            horizontal: "বৃদ্ধি পায় (বাড়ে)",
            vertical: "হ্রাস পায় (কমে)",
            horizontalGrad: "from-transparent via-[#fb923c]/40 to-[#fb923c]",
            verticalGrad: "from-[#fb923c] via-[#fb923c]/40 to-transparent",
            arrowColor: "text-[#fb923c]",
            explanation: "সমযোজী বন্ধনে আবদ্ধ দুটি পরমাণুর মধ্যে শেয়ারকৃত ইলেকট্রন যুগলকে নিজের দিকে আকর্ষণ করার ক্ষমতাকে তড়িৎ ঋণাত্মকতা বলে। একই পর্যায়ে বাম থেকে ডানে গেলে পরমাণুর আকার ছোট হয় এবং নিউক্লিয়াসের চার্জ বাড়ে, তাই ইলেকট্রন আকর্ষণ করার ক্ষমতা বাড়ে। একই গ্রুপে নিচে নামলে আকার বড় হওয়ার কারণে এই ক্ষমতা হ্রাস পায়। ফ্লোরিন (F = 4.0) সবচেয়ে বেশি তড়িৎ ঋণাত্মক মৌল।"
          }
        };

        // --- Main App Component ---
        const App = () => {
          const [activeTrendId, setActiveTrendId] = useState('size');
          const activeTrend = trendsInfo[activeTrendId];

          const renderCellVisual = (el) => {
            if (activeTrendId === 'size') {
              const sizePercent = (el.r / MAX_RADIUS) * 100;
              return (
                <div 
                  className="absolute rounded-full bg-gradient-to-br from-[#7c5cfc] to-[#e05cfc] shadow-[0_0_15px_rgba(124,92,252,0.5)] transition-all duration-700 ease-in-out"
                  style={{ width: `${sizePercent}%`, height: `${sizePercent}%` }}
                />
              );
            }
            if (activeTrendId === 'metallic') {
              const opacity = el.m / 100;
              return (
                <div 
                  className="absolute inset-0 bg-[#f5c842] transition-all duration-700 ease-in-out"
                  style={{ opacity: opacity * 0.85 }} 
                />
              );
            }
            if (activeTrendId === 'nonMetallic') {
              const opacity = el.nm / 100;
              return (
                <div 
                  className="absolute inset-0 bg-[#3dffa0] transition-all duration-700 ease-in-out"
                  style={{ opacity: opacity * 0.85 }}
                />
              );
            }
            if (activeTrendId === 'ionizationEnergy') {
              // Scale exact IE values up to 2400 (approx max for He) to calculate opacity
              const opacity = el.ie > 0 ? (el.ie / 2400) : 0;
              return (
                <div 
                  className="absolute inset-0 bg-[#22d3ee] transition-all duration-700 ease-in-out"
                  style={{ opacity: opacity * 0.85 + 0.05 }}
                />
              );
            }
            if (activeTrendId === 'electronAffinity') {
              // Scale exact EA values up to 350 (approx max for Cl) to calculate opacity
              const opacity = el.ea > 0 ? (el.ea / 350) : 0;
              return (
                <div 
                  className="absolute inset-0 bg-[#fb7185] transition-all duration-700 ease-in-out"
                  style={{ opacity: opacity * 0.85 }}
                />
              );
            }
            if (activeTrendId === 'electronegativity') {
              // Scale exact EN values up to 4.0 (Fluorine is 4.0) to calculate opacity
              const opacity = el.en > 0 ? (el.en / 4.0) : 0;
              return (
                <div 
                  className="absolute inset-0 bg-[#fb923c] transition-all duration-700 ease-in-out"
                  style={{ opacity: opacity * 0.85 }}
                />
              );
            }
          };

          return (
            <div className="max-w-6xl mx-auto p-4 md:p-8 pt-8 overflow-x-hidden">
              <div className="text-center mb-10">
                <div className="inline-block bg-gradient-accent text-white text-[11px] font-semibold tracking-wider px-4 py-1.5 rounded-full mb-4 uppercase">
                  অনলাইন ব্যাচ ২০২৬ · ৯ম শ্রেণি রসায়ন
                </div>
                <h1 className="text-3xl md:text-4xl font-bold leading-tight mb-2">
                  মৌলের <span className="text-gradient">পর্যায়বৃত্ত ধর্ম</span> ভিজ্যুয়ালাইজার
                </h1>
                <p className="text-[#8882aa] text-sm">অধ্যায় ৪ · পর্যায় সারণী (সম্পূর্ণ)</p>
              </div>

              <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-10">
                {Object.values(trendsInfo).map((trend) => {
                  const Icon = trend.icon;
                  const isActive = activeTrendId === trend.id;
                  return (
                    <button
                      key={trend.id}
                      onClick={() => setActiveTrendId(trend.id)}
                      className={`relative flex flex-col items-center p-4 rounded-2xl border transition-all duration-300 transform ${
                        isActive 
                          ? 'bg-[#1e1e2a] border-[#7c5cfc] shadow-[0_0_20px_rgba(124,92,252,0.2)] scale-[1.02] z-10' 
                          : 'bg-[#16161f] border-[#2e2e3e] hover:border-[#7c5cfc]/50'
                      }`}
                    >
                      <div className={`p-3 rounded-full mb-3 ${isActive ? 'bg-gradient-accent text-white' : 'bg-[#2e2e3e] text-[#8882aa]'}`}>
                        <Icon size={24} />
                      </div>
                      <h3 className={`text-base md:text-lg font-bold ${isActive ? 'text-[#f0eeff]' : 'text-[#8882aa]'}`}>
                        {trend.title}
                      </h3>
                      <span className="text-xs text-[#8882aa] mt-1">{trend.subtitle}</span>
                    </button>
                  );
                })}
              </div>

              <div className="bg-[#16161f] border border-[#2e2e3e] rounded-3xl p-6 md:p-8 shadow-2xl mb-8">
                <div className="flex flex-col gap-6">
                  <div className="flex items-center gap-4">
                    <div className="w-8 md:w-16 shrink-0" />
                    <div className="flex-1 flex flex-col items-center">
                      <span className="text-sm font-semibold mb-2 text-[#8882aa]">পর্যায় বরাবর (বাম থেকে ডানে)</span>
                      <div className={`w-full h-4 rounded-full bg-gradient-to-r ${activeTrend.horizontalGrad} flex items-center justify-end pr-2 border border-white/5`}>
                        <IconArrowRight size={18} className="text-white drop-shadow-md" />
                      </div>
                      <span className={`text-sm font-bold mt-2 ${activeTrend.arrowColor}`}>{activeTrend.title} {activeTrend.horizontal}</span>
                    </div>
                  </div>

                  <div className="flex gap-4 md:gap-6">
                    <div className="w-8 md:w-16 shrink-0 flex flex-col items-center">
                      <span className="text-sm font-semibold text-[#8882aa] whitespace-nowrap -rotate-90 mb-16 md:mb-20">গ্রুপ বরাবর (ওপর থেকে নিচে)</span>
                      <div className={`w-4 flex-1 rounded-full bg-gradient-to-b ${activeTrend.verticalGrad} flex items-end justify-center pb-2 border border-white/5`}>
                        <IconArrowDown size={18} className="text-white drop-shadow-md" />
                      </div>
                      <span className={`text-sm font-bold mt-3 text-center ${activeTrend.arrowColor}`}>{activeTrend.vertical}</span>
                    </div>

                    <div className="flex-1">
                      <div className="grid grid-cols-8 gap-1.5 md:gap-3 auto-rows-fr">
                        {elementsData.map((el) => (
                          <div 
                            key={el.sym} 
                            style={{ gridColumn: el.col, gridRow: el.p }}
                            className="relative aspect-square bg-[#1e1e2a] border border-[#2e2e3e] rounded-lg md:rounded-xl flex flex-col items-center justify-center overflow-hidden group"
                          >
                            {renderCellVisual(el)}
                            <span className="relative z-10 text-lg md:text-2xl font-bold text-white drop-shadow-md">
                              {el.sym}
                            </span>
                            <span className="relative z-10 text-[9px] md:text-xs text-white/80 font-medium">
                              {el.z}
                            </span>

                            <div className="absolute inset-0 bg-black/80 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-20 flex flex-col items-center justify-center text-[10px] md:text-xs font-bold text-white p-1 text-center backdrop-blur-sm">
                              {activeTrendId === 'size' && <span>{el.r} pm</span>}
                              {activeTrendId === 'metallic' && <span>ধাতব ধর্ম<br/>{el.m}%</span>}
                              {activeTrendId === 'nonMetallic' && <span>অধাতব ধর্ম<br/>{el.nm}%</span>}
                              {activeTrendId === 'ionizationEnergy' && <span>আয়নীকরণ শক্তি<br/>{el.ie} <span className="text-[8.5px] font-medium text-white/70">kJ/mol</span></span>}
                              {activeTrendId === 'electronAffinity' && <span>ইলেকট্রন আসক্তি<br/>{el.ea > 0 ? el.ea : '≈0'} <span className="text-[8.5px] font-medium text-white/70">kJ/mol</span></span>}
                              {/* Show Exact Value for Electronegativity */}
                              {activeTrendId === 'electronegativity' && <span>তড়িৎ ঋণাত্মকতা<br/>{el.en > 0 ? el.en.toFixed(1) : '-'}</span>}
                            </div>
                          </div>
                        ))}
                      </div>
                      <p className="text-right text-[11px] text-[#8882aa] mt-3">
                        * d-ব্লক (অবস্থান্তর ধাতু) মৌলসমূহকে সরলতার জন্য এই ভিজ্যুয়ালাইজেশন থেকে বাদ দেওয়া হয়েছে।
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-[#1e1e2a] border-l-4 border-l-[#7c5cfc] rounded-r-2xl p-6 md:p-8 shadow-lg mb-12">
                <h3 className="text-xl font-bold mb-3 text-[#f0eeff] flex items-center gap-2">
                  <IconBookOpen size={24} className="text-[#7c5cfc]" />
                  কেন এমনটি ঘটে?
                </h3>
                <p className="text-[#8882aa] text-[15px] leading-relaxed">
                  {activeTrend.explanation}
                </p>
                
                {/* Exception Alert Box */}
                {activeTrend.exception && (
                  <div className="mt-5 bg-[#ff5c5c]/10 border border-[#ff5c5c]/25 rounded-xl p-4 flex gap-3 items-start">
                    <div className="text-[#ff5c5c] shrink-0 mt-0.5">
                      <IconAlertTriangle size={20} />
                    </div>
                    <div>
                      <h4 className="text-[#ff5c5c] font-bold text-[14px] mb-1">ব্যতিক্রম নিয়ম!</h4>
                      <p className="text-[#ff5c5c]/90 text-[13.5px] leading-relaxed">
                        {activeTrend.exception}
                      </p>
                    </div>
                  </div>
                )}
              </div>

              <div className="flex justify-center mb-8">
                <div className="flex items-center gap-3 bg-[#16161f] border border-[#2e2e3e] rounded-xl py-2.5 px-6 shadow-lg">
                  <div className="w-10 h-10 rounded-full bg-gradient-accent flex items-center justify-center text-sm font-bold text-white shrink-0">
                    ইউ
                  </div>
                  <div className="text-left">
                    <a href="https://www.facebook.com/usha.khan.50596" target="_blank" rel="noreferrer" className="text-[14px] font-semibold text-[#f0eeff] hover:text-[#7c5cfc] transition-colors">
                      Md. Usha Khan (ইউশা)
                    </a>
                    <div className="text-[11px] text-[#8882aa]">Chemistry Instructor, 10MS · CSE, BUET</div>
                  </div>
                </div>
              </div>

              <div className="rounded-[20px] p-8 text-center relative overflow-hidden" style={{ background: 'linear-gradient(135deg, rgba(124,92,252,0.15), rgba(224,92,252,0.10))', border: '1px solid rgba(124,92,252,0.3)' }}>
                <div className="absolute inset-0 pointer-events-none" style={{ backgroundImage: 'linear-gradient(rgba(124,92,252,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(124,92,252,0.06) 1px, transparent 1px)', backgroundSize: '24px 24px' }}></div>
                <div className="relative z-10">
                  <div className="text-4xl mb-3 flex justify-center text-[#7c5cfc]">
                    <IconUsers size={40} />
                  </div>
                  <h3 className="text-xl font-bold mb-2">
                    আমার <span className="text-gradient">এক্সক্লুসিভ ফেসবুক গ্রুপে</span> যোগ দাও!
                  </h3>
                  <p className="text-[14px] text-[#8882aa] mb-5 max-w-lg mx-auto leading-relaxed">
                    ক্লাসের আপডেট, নোট, MCQ প্র্যাকটিস, আর ইউশা ভাইয়ার সাথে সরাসরি প্রশ্ন করার সুযোগ — সব এক জায়গায়।
                  </p>
                  <div className="flex flex-wrap justify-center gap-2 mb-6">
                    <span className="bg-white/5 border border-white/10 rounded-full px-3.5 py-1 text-[13px] text-[#8882aa] flex items-center gap-1.5"><IconBookMarked size={14} /> ক্লাস নোট</span>
                    <span className="bg-white/5 border border-white/10 rounded-full px-3.5 py-1 text-[13px] text-[#8882aa] flex items-center gap-1.5"><IconGraduationCap size={14} /> MCQ প্র্যাকটিস</span>
                    <span className="bg-white/5 border border-white/10 rounded-full px-3.5 py-1 text-[13px] text-[#8882aa] flex items-center gap-1.5"><IconCheckCircle2 size={14} /> ডাউট সলভ</span>
                  </div>
                  <a 
                    href="https://www.facebook.com/groups/chemputer007" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="inline-flex items-center gap-2 bg-[#1877F2] hover:bg-[#1877F2]/90 text-white font-bold text-[15px] px-7 py-3.5 rounded-xl transition-all transform hover:-translate-y-0.5 active:scale-95 shadow-lg"
                  >
                    <IconFacebook size={20} className="text-white border-none" />
                    Facebook গ্রুপে যোগ দাও
                  </a>
                  <p className="text-[12px] text-[#8882aa] mt-3">🔒 ক্লাস ৯ থেকে ১২ এর স্টুডেন্টদের জন্য এডুকেশনাল গ্রুপ!</p>
                </div>
              </div>

              <div className="text-center mt-12 text-[12px] text-[#8882aa] leading-relaxed">
                তৈরি করেছেন{' '}
                <strong>
                  <a href="https://www.facebook.com/usha.khan.50596" target="_blank" rel="noreferrer" className="text-[#7c5cfc] hover:underline">
                    Md. Usha Khan (ইউশা)
                  </a>
                </strong>{' '}
                <br/>
                Chemistry Instructor, 10 Minute School · CSE, BUET
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
